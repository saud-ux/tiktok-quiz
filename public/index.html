<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كويز لايف — TikTok Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#050e05;color:#f0fdf4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(circle,#1a3d1a18 1px,transparent 1px);background-size:28px 28px}
.container{text-align:center;max-width:440px;width:100%}
.logo{font-size:48px;font-weight:900;color:#4ade80;text-shadow:0 0 24px #4ade8070,0 0 48px #16a34a50;margin-bottom:8px}
.tagline{color:#86efac;font-size:16px;margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:14px}
a.card{background:#0c1c0c;border:1px solid #1a3d1a;border-radius:18px;padding:22px 24px;text-decoration:none;color:#f0fdf4;display:flex;align-items:center;gap:16px;transition:.2s}
a.card:hover{border-color:#22c55e;background:#0f260f;transform:translateY(-2px);box-shadow:0 4px 20px #16a34a30}
.card-icon{font-size:36px;flex-shrink:0}
.card-body{text-align:right;flex:1}
.card-title{font-size:18px;font-weight:800;margin-bottom:3px}
.card-desc{font-size:13px;color:#86efac}
.card-arrow{font-size:20px;color:#4ade80;flex-shrink:0}
.footer{margin-top:32px;font-size:13px;color:#4ade8080}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🎮 كويز لايف</div>
  <div class="tagline">لعبة كويز تفاعلية للبث المباشر على تيك توك</div>
  <div class="cards">
    <a href="/host" class="card">
      <div class="card-icon">🎛️</div>
      <div class="card-body">
        <div class="card-title">لوحة المضيف</div>
        <div class="card-desc">أدر اللعبة وابدأ الأسئلة وتابع النتائج</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a href="/play" class="card">
      <div class="card-icon">🎮</div>
      <div class="card-body">
        <div class="card-title">العب الآن</div>
        <div class="card-desc">انضم للعبة وأجب على الأسئلة واستخدم خصائصك</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a href="/leaderboard" class="card">
      <div class="card-icon">🏆</div>
      <div class="card-body">
        <div class="card-title">الليدربورد</div>
        <div class="card-desc">اعرضه على شاشة البث — يتحدث تلقائياً</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
  </div>
  <div class="footer">افتح /play على جوالك • افتح /host و /leaderboard على الكمبيوتر</div>
</div>
</body>
</html>
