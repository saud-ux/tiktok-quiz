<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كويز لايف — TikTok Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:#0d0d1a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{text-align:center;max-width:440px;width:100%}
.logo{font-size:48px;font-weight:900;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.tagline{color:#94a3b8;font-size:16px;margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:14px}
a.card{background:#1a1a35;border:1px solid #2a2a4a;border-radius:18px;padding:22px 24px;text-decoration:none;color:#e2e8f0;display:flex;align-items:center;gap:16px;transition:.2s}
a.card:hover{border-color:#7c3aed;background:#1e1b4b;transform:translateY(-2px)}
.card-icon{font-size:36px;flex-shrink:0}
.card-body{text-align:right;flex:1}
.card-title{font-size:18px;font-weight:800;margin-bottom:3px}
.card-desc{font-size:13px;color:#94a3b8}
.card-arrow{font-size:20px;color:#7c3aed;flex-shrink:0}
.footer{margin-top:32px;font-size:13px;color:#475569}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🎮 كويز لايف</div>
  <div class="tagline">لعبة كويز تفاعلية للبث المباشر على تيك توك</div>
  <div class="cards">
    <a href="/host" class="card">
      <div class="card-icon">🎛️</div>
      <div class="card-body">
        <div class="card-title">لوحة المضيف</div>
        <div class="card-desc">أدر اللعبة وابدأ الأسئلة وتابع النتائج</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a href="/play" class="card">
      <div class="card-icon">🎮</div>
      <div class="card-body">
        <div class="card-title">العب الآن</div>
        <div class="card-desc">انضم للعبة وأجب على الأسئلة واستخدم خصائصك</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
    <a href="/leaderboard" class="card">
      <div class="card-icon">🏆</div>
      <div class="card-body">
        <div class="card-title">الليدربورد</div>
        <div class="card-desc">اعرضه على شاشة البث — يتحدث تلقائياً</div>
      </div>
      <div class="card-arrow">←</div>
    </a>
  </div>
  <div class="footer">افتح /play على جوالك • افتح /host و /leaderboard على الكمبيوتر</div>
</div>
</body>
</html>
